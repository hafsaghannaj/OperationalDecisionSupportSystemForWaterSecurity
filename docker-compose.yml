services:
  db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: odssws
      POSTGRES_USER: odssws
      POSTGRES_PASSWORD: odssws
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odssws -d odssws"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data

  api:
    build:
      context: .
      dockerfile: infra/docker/api.Dockerfile
    command: uvicorn services.api.app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      ODSSWS_ENVIRONMENT: development
      ODSSWS_DATABASE_URL: postgresql+psycopg://odssws:odssws@db:5432/odssws
      ODSSWS_ALLOWED_ORIGINS: '["http://localhost:3000","http://localhost:3001"]'
    ports:
      - "8000:8000"
    volumes:
      - .:/app

  worker:
    build:
      context: .
      dockerfile: infra/docker/worker.Dockerfile
    command: python -m services.worker.app.main
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      ODSSWS_ENVIRONMENT: development
      ODSSWS_DATABASE_URL: postgresql+psycopg://odssws:odssws@db:5432/odssws
    volumes:
      - .:/app

  web:
    build:
      context: .
      dockerfile: infra/docker/web.Dockerfile
    command: npm run dev
    depends_on:
      - api
    environment:
      ODSSWS_API_BASE_URL: http://api:8000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3001:3000"
    volumes:
      - .:/app
      - web_node_modules:/app/services/web/node_modules

volumes:
  postgis_data:
  web_node_modules:
