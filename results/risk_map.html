<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Waterborne Disease Risk Map</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    body {
      margin: 0;
      font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
      background: linear-gradient(180deg, #081726 0%, #041018 100%);
      color: #d8ebf6;
    }
    .hero { padding: 24px 24px 12px; }
    h1 { margin: 0 0 6px; font-size: 1.8rem; }
    p { margin: 0; color: #9fc0d4; max-width: 60rem; }
    #map {
      height: 72vh;
      margin: 12px 24px 24px;
      border: 1px solid rgba(111, 184, 225, 0.25);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.3);
    }
    .legend {
      margin: 0 24px 24px;
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      color: #b7d5e8;
      font-size: 0.92rem;
    }
    .legend span::before {
      content: "";
      display: inline-block;
      width: 10px;
      height: 10px;
      margin-right: 8px;
      border-radius: 50%;
      vertical-align: middle;
    }
    .low::before { background: #22c55e; }
    .medium::before { background: #f59e0b; }
    .high::before { background: #ef4444; }
  </style>
</head>
<body>
  <section class="hero">
    <h1>Waterborne Disease Risk Map</h1>
    <p>Deterministic Bangladesh pilot demo built from locked repo fixtures and upgraded to live covariates when they exist.</p>
  </section>
  <div id="map"></div>
  <div class="legend">
    <span class="low">Low risk under 40</span>
    <span class="medium">Medium risk 40 to 69</span>
    <span class="high">High risk 70 and above</span>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const points = [{"region_id": "BD-4047", "location_label": "Khulna", "latitude": 22.22168, "longitude": 89.44148, "target_date": "2026-03-09", "rainfall_mm_7d": 11.3, "flood_proxy": 0.565, "sanitation_access_pct": 83.2, "population_density_km2": 497.0, "temperature_c": 28.71, "surface_water_index": 0.663, "wash_access_basic_water_pct": 97.0, "rainfall_anomaly_zscore": 1.658, "driver_summary": "sanitation gap 16.8 pts + density 497/km2", "risk_score": 26.57}, {"region_id": "BD-1006", "location_label": "Barisal", "latitude": 22.7007, "longitude": 90.28626, "target_date": "2026-03-09", "rainfall_mm_7d": 9.6, "flood_proxy": 0.48, "sanitation_access_pct": 76.9, "population_density_km2": 789.0, "temperature_c": 28.38, "surface_water_index": 0.604, "wash_access_basic_water_pct": 99.0, "rainfall_anomaly_zscore": 1.586, "driver_summary": "sanitation gap 23.1 pts + density 789/km2", "risk_score": 30.56}, {"region_id": "BD-3026", "location_label": "Dhaka", "latitude": 23.73098, "longitude": 90.20788, "target_date": "2026-03-09", "rainfall_mm_7d": 15.2, "flood_proxy": 0.76, "sanitation_access_pct": 86.1, "population_density_km2": 12372.0, "temperature_c": 29.5, "surface_water_index": 0.79, "wash_access_basic_water_pct": 99.8, "rainfall_anomaly_zscore": 1.732, "driver_summary": "density 12372/km2 + rainfall 15.2 mm", "risk_score": 61.88}];
    const map = L.map("map").setView([23.5, 90.1], 7);
    L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 18,
      attribution: "&copy; OpenStreetMap contributors"
    }).addTo(map);

    function riskColor(score) {
      if (score >= 70) return "#ef4444";
      if (score >= 40) return "#f59e0b";
      return "#22c55e";
    }

    points.forEach((point) => {
      const circle = L.circleMarker([point.latitude, point.longitude], {
        radius: 10,
        color: riskColor(point.risk_score),
        fillColor: riskColor(point.risk_score),
        fillOpacity: 0.82,
        weight: 2
      });
      circle.bindPopup(
        `<strong>${point.location_label}</strong><br>` +
        `Region: ${point.region_id}<br>` +
        `Risk score: ${point.risk_score}<br>` +
        `Date: ${point.target_date}<br>` +
        `Drivers: ${point.driver_summary}`
      );
      circle.addTo(map);
    });
  </script>
</body>
</html>
